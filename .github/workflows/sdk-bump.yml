name: SDK Bump & Release

# Manually-triggered workflow that automates the full SDK release flow:
#
#   1. Read sdk/version.go and compute the next version (patch/minor/major).
#   2. Update the Version constant.
#   3. Run vet + race-enabled tests on the bumped sources.
#   4. Commit the bump on master as github-actions[bot].
#   5. Create and push an annotated tag of the form `sdk/vX.Y.Z`.
#   6. Invoke the reusable `sdk-release.yml` workflow to validate the tag,
#      build a source tarball, and publish a GitHub Release.
#
# Trigger: GitHub UI -> Actions -> "SDK Bump & Release" -> Run workflow,
# choose patch / minor / major.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Which semver component to bump'
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: sdk-bump
  cancel-in-progress: false

jobs:
  bump:
    name: bump version + tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.compute.outputs.tag }}
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          # Use the default GITHUB_TOKEN; we'll push commits and tags with it.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: sdk/go.mod

      - name: Compute next version
        id: compute
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          file="sdk/version.go"
          current=$(grep -oE 'Version = "v[0-9]+\.[0-9]+\.[0-9]+"' "$file" \
                    | head -n1 \
                    | sed -E 's/.*"v([0-9]+\.[0-9]+\.[0-9]+)"/\1/')
          if [ -z "$current" ]; then
            echo "could not parse Version from $file"; exit 1
          fi

          major="${current%%.*}"
          rest="${current#*.}"
          minor="${rest%%.*}"
          patch="${rest#*.}"

          case "$BUMP" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
            *) echo "unknown bump type: $BUMP"; exit 1 ;;
          esac

          new_version="v${major}.${minor}.${patch}"
          {
            echo "current=v${current}"
            echo "version=${new_version}"
            echo "tag=sdk/${new_version}"
          } >> "$GITHUB_OUTPUT"
          echo "bumping v${current} -> ${new_version}"

      - name: Update sdk/version.go
        run: |
          set -euo pipefail
          file="sdk/version.go"
          current="${{ steps.compute.outputs.current }}"
          new="${{ steps.compute.outputs.version }}"
          # Use a Perl one-liner for portable in-place editing.
          perl -i -pe "s/Version = \"${current}\"/Version = \"${new}\"/" "$file"
          grep "Version = " "$file"

      - name: Verify the bumped SDK builds and tests pass
        working-directory: sdk
        run: |
          go vet ./...
          go test ./... -race

      - name: Verify the tag does not already exist
        run: |
          set -euo pipefail
          tag="${{ steps.compute.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "tag ${tag} already exists locally"; exit 1
          fi
          if git ls-remote --exit-code --tags origin "${tag}" >/dev/null 2>&1; then
            echo "tag ${tag} already exists on origin"; exit 1
          fi

      - name: Commit bump and create tag
        run: |
          set -euo pipefail
          tag="${{ steps.compute.outputs.tag }}"
          version="${{ steps.compute.outputs.version }}"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add sdk/version.go
          git commit -m "chore(sdk): bump version to ${version}"
          git tag -a "${tag}" -m "Release SDK ${version}"

          git push origin master
          git push origin "${tag}"

  release:
    name: publish release for new tag
    needs: bump
    uses: ./.github/workflows/sdk-release.yml
    with:
      tag: ${{ needs.bump.outputs.tag }}
    secrets: inherit
