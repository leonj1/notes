services:
  mysql:
    image: mysql:8.0
    # - Disable strict modes so the legacy zero-date default in the notes
    #   schema is accepted by MySQL 8.
    # - Use mysql_native_password so clients (Flyway's bundled JDBC driver
    #   and Go's go-sql-driver) can authenticate without SSL/RSA setup.
    command:
      - --sql-mode=NO_ENGINE_SUBSTITUTION
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: notes
      MYSQL_USER: notes
      MYSQL_PASSWORD: notes
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  flyway:
    image: flyway/flyway:10
    command:
      - -url=jdbc:mysql://mysql:3306/notes?allowPublicKeyRetrieval=true&useSSL=false
      - -user=notes
      - -password=notes
      - -connectRetries=60
      - migrate
    volumes:
      - ./migrations:/flyway/sql:ro
    depends_on:
      mysql:
        condition: service_healthy

  notes:
    build:
      context: .
      dockerfile: Dockerfile.build
    command:
      - -host=mysql:3306
      - -user=notes
      - -pass=notes
      - -db=notes
      - -port=8080
    ports:
      - "${NOTES_PORT:-8080}:8080"
    depends_on:
      flyway:
        condition: service_completed_successfully

volumes:
  mysql-data:
